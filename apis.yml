description: >-
  Dealogic is a global provider of content and software for the capital
  markets, including deal-management, analytics, league-table, and
  compliance solutions used by investment banks, sales/trading desks, and
  investment managers. Dealogic delivers data and connectivity primarily
  through its Cortex platform, Dealogic Connect, and Analytics products
  rather than a self-service public developer API; integrations are
  contracted with customers and accessed under license rather than from a
  public developer portal.
