    url: https://developers.dealogic.com/docs/authentication
- name: Dealogic Deal Data API
  description: 'Access comprehensive deal information including M&A transactions, equity offerings, debt issuances, and syndicated loans. Real-time and historical deal data with detailed terms and conditions.

